version: '3.8'

services:
  # MySQL Database for relational data (users, documents, flashcards, etc.)
  mysql:
    image: mysql:8.0
    container_name: study-assistant-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: study_assistant
      MYSQL_USER: study_user
      MYSQL_PASSWORD: study_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - study-network

  # Redis for caching and job queue (BullMQ)
  redis:
    image: redis:7-alpine
    container_name: study-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
    networks:
      - study-network

  # Qdrant Vector Database for RAG and semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: study-assistant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT_API_KEY: study_qdrant_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      timeout: 10s
      retries: 5
    networks:
      - study-network

  # Optional: Adminer for database management UI
  adminer:
    image: adminer
    container_name: study-assistant-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - study-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  qdrant_storage:
    driver: local

networks:
  study-network:
    driver: bridge
